<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>电网数据同步控制台</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="apple-touch-icon" href="./sgcc-logo.svg" />
  <meta name="theme-color" content="#0f1419" id="themeColorMeta" />
  <script>
    /* 首屏防闪烁：在 CSS 渲染前应用已保存的主题偏好 + 自定义底色 */
    (function () {
      var mode = localStorage.getItem("dashboard_theme") || "system";
      var resolved = mode === "system"
        ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : mode;
      document.documentElement.setAttribute("data-theme", resolved);
      document.documentElement.setAttribute("data-theme-mode", mode);
      /* 同步恢复自定义底色，避免首屏闪到 CSS 默认值 */
      var defaults = { dark: "#1c1c1c", light: "#f5f6f8" };
      var savedBg = localStorage.getItem("dashboard_bg_" + resolved);
      var bg = savedBg || defaults[resolved];
      document.documentElement.style.setProperty("--bg-custom", bg);
      var meta = document.getElementById("themeColorMeta");
      if (meta) meta.content = bg;
    })();
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="国电网数据" />
  <link rel="manifest"
    href="data:application/manifest+json,%7B%22name%22%3A%22%E5%9B%BD%E5%AE%B6%E7%94%B5%E7%BD%91%E6%95%B0%E6%8D%AE%E6%8E%A7%E5%88%B6%E5%8F%B0%22%2C%22short_name%22%3A%22%E7%94%B5%E8%B4%B9%E7%9B%91%E6%8E%A7%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230f1419%22%2C%22theme_color%22%3A%22%230f1419%22%2C%22start_url%22%3A%22.%2F%22%7D" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    :root,
    [data-theme="dark"] {
      /* 可自定义底色：默认 HA 风格中性深灰 #1c1c1c，可通过顶栏颜色选择器覆盖。
         其余表面色由 color-mix 派生，形成 Grafana 式分层(bg < stat < card)。 */
      --bg-custom: #1c1c1c;
      --bg: var(--bg-custom);
      /* card：底色向白提亮 8%，比底色亮一档形成抬升表面 */
      --card: color-mix(in srgb, var(--bg-custom) 92%, #ffffff);
      --border: color-mix(in srgb, var(--bg-custom) 70%, #4a4a4a);
      --text: #e7ecf3;
      --muted: #8b9cb3;
      /* 国网官方绿 #00716B：低饱和青绿，沉稳不鲜艳。白字按钮 5.88:1(AA)。
         accent2 为同色系亮一档，用于 hover/数据区分，避免高饱和荧光感。 */
      --accent: #00716b;
      --accent2: #0d8a83;
      --warn: #f59e0b;
      --danger: #ef4444;
      --info: #60a5fa;
      --danger-bg: #450a0a;
      --success-bg: #064e3b;
      --success-fg: #2dd4bf;
      --warn-bg: #422006;
      /* stat-bg：card 基础上压暗 4%，介于 bg 与 card 之间 */
      --stat-bg: color-mix(in srgb, var(--card) 96%, #000000);
      /* surface-deep：比底色更暗 5%，用于 navbar 等下沉表面 */
      --surface-deep: color-mix(in srgb, var(--bg-custom) 95%, #000000);
      --header-grad: var(--surface-deep);
      --log-text: #b8c5d6;
      --pill-bg: color-mix(in srgb, var(--card) 80%, #000000);
      --step-badge-bg: color-mix(in srgb, var(--accent) 45%, #000000);
      --step-badge-text: #5eead4;
      --banner-warn-bg: #431407;
      --banner-warn-border: #7c2d12;
      --banner-warn-text: #fdba74;
      --banner-info-bg: #172554;
      --banner-info-border: #1e3a5f;
      --banner-info-text: #93c5fd;
      --skeleton-a: var(--card);
      --skeleton-b: color-mix(in srgb, var(--card) 70%, #ffffff);
      --card-hover-border: rgba(0, 113, 107, 0.45);
      --card-shadow: rgba(0, 0, 0, 0.35);
      --modal-overlay: rgba(0, 0, 0, 0.6);
      --scrollbar: color-mix(in srgb, var(--bg-custom) 70%, #6a6a6a);
      --login-bg: var(--bg);
      --login-box-bg: var(--card);
      --login-input-bg: var(--surface-deep);
      --login-title-grad: linear-gradient(135deg, #e7ecf3 0%, #93c5fd 100%);
      --chart-muted: #8b9cb3;
      --chart-grid: rgba(45, 58, 79, 0.3);
      --chart-label: #e7ecf3;
      --chart-tooltip-bg: rgba(15, 20, 25, 0.95);
      --chart-tooltip-title: #e7ecf3;
      --chart-tooltip-body: #b8c5d6;
      --chart-tooltip-border: #2d3a4f;
      --chart-point-border: #0f1419;
      --bar-label: #fff;
      /* 焦点环：#2dd4bf 在深色 bg/card 上超 7:1，2px 实线 + 光晕保证键盘可见 */
      --focus-ring: rgba(45, 212, 191, 0.5);
      --focus-ring-strong: #2dd4bf;
      --focus-ring-offset: var(--card);
    }

    [data-theme="light"] {
      /* 浅色主题：底色可自定义，默认中性浅灰。card 保持纯白(最亮抬升表面)。 */
      --bg-custom: #f5f6f8;
      --bg: var(--bg-custom);
      --card: #ffffff;
      --border: color-mix(in srgb, var(--bg-custom) 60%, #b8c0cc);
      --text: #1a2332;
      /* muted 由 #64748b 调深至 #586476：在 bg 上 5.35:1、card 上 6.00:1，均达 AA 4.5:1 */
      --muted: #586476;
      /* 国网官方绿 #00716B：浅色白底 5.88:1(AA)，低饱和不刺眼 */
      --accent: #00716b;
      --accent2: #0d8a83;
      --warn: #d97706;
      --danger: #dc2626;
      --info: #3b82f6;
      --danger-bg: #fef2f2;
      --success-bg: #ecfdf5;
      --success-fg: #00716b;
      --warn-bg: #fffbeb;
      --stat-bg: color-mix(in srgb, var(--bg-custom) 50%, #ffffff);
      /* surface-deep：比底色更暗一档，用于 navbar 等下沉表面 */
      --surface-deep: color-mix(in srgb, var(--bg-custom) 88%, #000000);
      --header-grad: var(--surface-deep);
      --log-text: #334155;
      --pill-bg: color-mix(in srgb, var(--bg-custom) 40%, #ffffff);
      --step-badge-bg: color-mix(in srgb, var(--accent) 18%, #ffffff);
      --step-badge-text: #00716b;
      --banner-warn-bg: #fff7ed;
      --banner-warn-border: #fdba74;
      --banner-warn-text: #c2410c;
      --banner-info-bg: #eff6ff;
      --banner-info-border: #93c5fd;
      --banner-info-text: #1d4ed8;
      --skeleton-a: color-mix(in srgb, var(--bg-custom) 60%, #ffffff);
      --skeleton-b: color-mix(in srgb, var(--bg-custom) 30%, #ffffff);
      --card-hover-border: rgba(0, 113, 107, 0.4);
      --card-shadow: rgba(15, 23, 42, 0.1);
      --modal-overlay: rgba(15, 23, 42, 0.35);
      --scrollbar: color-mix(in srgb, var(--bg-custom) 50%, #ffffff);
      --login-bg: var(--bg);
      --login-box-bg: var(--card);
      --login-input-bg: #ffffff;
      --login-title-grad: var(--text);
      --chart-muted: #64748b;
      --chart-grid: rgba(148, 163, 184, 0.35);
      --chart-label: #1e293b;
      --chart-tooltip-bg: rgba(255, 255, 255, 0.98);
      --chart-tooltip-title: #1e293b;
      --chart-tooltip-body: #475569;
      --chart-tooltip-border: #d1d9e6;
      --chart-point-border: #ffffff;
      --bar-label: #fff;
      /* 焦点环：国网绿 #00716b 在白/浅灰 card 上 5.88:1，浅主题亦达 AA */
      --focus-ring: rgba(0, 113, 107, 0.45);
      --focus-ring-strong: #00716b;
      --focus-ring-offset: var(--card);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    *::selection {
      background: rgba(0, 113, 107, 0.35);
      color: #fff;
    }

    /* 自定义滚动条：暗色主题匹配 */
    *::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    *::-webkit-scrollbar-track {
      background: transparent;
    }

    *::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 4px;
    }

    *::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    html {
      scrollbar-color: var(--scrollbar) transparent;
      scrollbar-width: thin;
      overflow-x: clip;
      max-width: 100%;
    }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, color 0.2s;
      overflow-x: clip;
      max-width: 100%;
      /* 等宽数字：金额/kWh/日期对齐不跳动，像真实计量工具而非 AI demo */
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }

    /* 双层顶栏：第一行品牌+操作(appbar)，第二行导航+状态(navbar)。
       像 Grafana/Vercel 的分层结构，导航与操作分离，层级清晰。 */
    header {
      border-bottom: 1px solid var(--border);
      background: var(--card);
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
    }

    .appbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.7rem 1.25rem;
      min-width: 0;
    }

    .navbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      /* 垂直留白：内容上下各 0.55rem，避免与 tabs 紧贴显得拥挤 */
      padding: 0.55rem 1.25rem;
      border-top: 1px solid var(--border);
      background: var(--surface-deep);
    }

    header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 0.72rem;
      margin-top: 0.1rem;
    }

    /* 状态条：navbar 右侧，font 稍小，与导航标签区分 */
    header .meta {
      color: var(--muted);
      font-size: 0.78rem;
      margin-left: auto;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.3rem;
      line-height: 1.5;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 0;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-logo,
    .login-logo {
      object-fit: contain;
      display: block;
    }

    .brand-logo {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      /* 中性阴影：去掉品牌绿发光，像真实工具栏图标 */
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
    }

    .toolbar {
      margin-left: auto;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    #userSelect {
      min-width: 9.5rem;
      max-width: 14rem;
      flex: 0 1 auto;
    }

    .toolbar-user {
      flex: 0 0 auto;
    }

    button,
    select,
    input[type="password"],
    input[type="text"] {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.45rem 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: filter 0.15s, transform 0.05s, opacity 0.2s, border-color 0.2s;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    button:active:not(:disabled) {
      transform: scale(0.97);
    }

    /* 可见焦点态：仅键盘聚焦(:focus-visible)显示，鼠标点击不残留焦点环 */
    button:focus-visible,
    select:focus-visible,
    input[type="password"]:focus-visible,
    input[type="text"]:focus-visible,
    textarea:focus-visible,
    a:focus-visible {
      outline: 2px solid var(--focus-ring-strong);
      outline-offset: 2px;
      /* 柔和光晕增强可见性，深/浅主题均适配 */
      box-shadow: 0 0 0 4px var(--focus-ring);
      border-radius: 8px;
    }

    button:focus-visible {
      outline-offset: 2px;
    }

    button .spinner {
      display: inline-block;
      width: 0.85em;
      height: 0.85em;
      margin-right: 0.4rem;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      vertical-align: -1px;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #refreshBtn.spinning {
      pointer-events: none;
    }

    #refreshBtn.spinning svg,
    #fetchBtn.spinning svg {
      animation: spin 0.8s linear infinite;
    }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-icon svg {
      width: 1em;
      height: 1em;
      flex: 0 0 auto;
    }

    #themeBtn {
      padding: 0.45rem 0.55rem;
    }

    #themeBtn svg {
      width: 1.15em;
      height: 1.15em;
    }

    #themeBtn .theme-icon {
      display: none;
    }

    [data-theme-mode="system"] #themeBtn .icon-system {
      display: block;
    }

    [data-theme-mode="light"] #themeBtn .icon-light {
      display: block;
    }

    [data-theme-mode="dark"] #themeBtn .icon-dark {
      display: block;
    }

    /* 背景色选择器：按钮内嵌色块预览，点击弹出 popover */
    .bg-color-wrap {
      position: relative;
      display: inline-flex;
    }

    #bgColorBtn {
      padding: 0.45rem 0.55rem;
    }

    /* 色块：圆角小方块，带描边便于在浅底上可见 */
    .bg-color-swatch {
      display: block;
      width: 1.15em;
      height: 1.15em;
      border-radius: 4px;
      background: var(--bg-custom);
      border: 1px solid var(--border);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
    }

    /* popover 浮层：锚定按钮右下方 */
    .bg-popover {
      position: absolute;
      top: calc(100% + 0.5rem);
      right: 0;
      z-index: 60;
      width: 220px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      animation: bgPopoverIn 0.15s ease;
    }

    /* 关键：display:flex 会覆盖 HTML 的 hidden 属性，必须显式恢复，
       否则刷新后面板默认显示且 JS 设 hidden=true 也关不掉 */
    .bg-popover[hidden] {
      display: none;
    }

    @keyframes bgPopoverIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bg-popover-title {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
    }

    /* 预设色块网格 */
    .bg-presets {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.4rem;
    }

    .bg-preset {
      aspect-ratio: 1;
      border-radius: 7px;
      border: 1px solid var(--border);
      cursor: pointer;
      padding: 0;
      transition: transform 0.1s, box-shadow 0.15s;
    }

    .bg-preset:hover {
      transform: scale(1.08);
    }

    /* 选中态：accent 色描边光环 */
    .bg-preset.active {
      box-shadow: 0 0 0 2px var(--card), 0 0 0 4px var(--accent);
    }

    /* 自定义颜色行 */
    .bg-custom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .bg-custom-row input[type="color"] {
      width: 2.2rem;
      height: 1.8rem;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
    }

    /* 重置按钮 */
    .bg-reset-btn {
      width: 100%;
      padding: 0.5rem;
      border-radius: 8px;
      background: var(--stat-bg);
      color: var(--text);
      font-size: 0.82rem;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }

    .bg-reset-btn:hover {
      background: var(--surface-deep);
    }

    main {
      padding: 1rem 1.5rem 2rem;
      display: grid;
      gap: 1rem;
      min-width: 0;
      max-width: 100%;
    }

    #panelMonitor {
      min-width: 0;
      max-width: 100%;
    }

    #rowStepMonthly {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 1rem;
      min-width: 0;
      max-width: 100%;
    }

    #rowStepMonthly.has-step {
      grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
    }

    #rowStepMonthly > .card {
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 960px) {
      #rowStepMonthly.has-step {
        grid-template-columns: 1fr;
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }

      main {
        padding: 0.75rem;
        gap: 0.75rem;
      }

      .appbar {
        padding: 0.6rem 0.75rem;
      }

      .navbar {
        padding: 0 0.75rem;
      }

      header h1 {
        font-size: 1rem;
      }
    }

    /* 移动端：≤720px 隐藏按钮文字只留图标，提升信息密度 */
    @media (max-width: 720px) {
      .toolbar {
        width: 100%;
        margin-left: 0;
        justify-content: space-between;
      }

      .btn-icon .btn-text {
        display: none;
      }

      /* icon-only 按钮命中区提到 ≥44px（CRITICAL：触摸目标最小值），视觉尺寸不变 */
      .btn-icon {
        padding: 0.55rem 0.7rem;
        min-height: 44px;
        min-width: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .btn-icon svg {
        width: 1.15em;
        height: 1.15em;
      }

      .tab-btn .tab-text {
        display: none;
      }

      .tab-btn {
        padding: 0.55rem 0.75rem;
        min-height: 44px;
      }

      .tab-btn svg {
        width: 1.1em;
        height: 1.1em;
        display: block;
      }

      /* 移动端：双层栏压缩，状态条移到 navbar 下方独立行避免与 tabs 挤 */
      header {
        position: relative;
      }

      .appbar {
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .navbar {
        flex-wrap: wrap;
        gap: 0.4rem;
        padding: 0.4rem 0.6rem;
      }

      /* 移动端状态条独占一行，不与 tabs 争空间 */
      header .meta {
        margin-left: 0;
        width: 100%;
        font-size: 0.72rem;
      }

      header h1 {
        font-size: 0.92rem;
      }

      .brand-sub {
        display: none;
      }

      .brand-logo {
        width: 34px;
        height: 34px;
      }

      .stat {
        padding: 0.65rem 0.75rem;
      }

      .stat .value {
        font-size: 1.1rem;
      }

      .stat .label {
        font-size: 0.7rem;
      }

      .chart-wrap {
        height: 220px;
      }

      .chart-wrap.tall {
        height: 260px;
      }

      main {
        padding: 0.5rem;
        gap: 0.5rem;
      }

      .card {
        padding: 0.75rem 0.85rem;
        border-radius: 10px;
      }

      .card h2 {
        font-size: 0.88rem;
        margin-bottom: 0.5rem;
      }

      .step-item {
        padding: 0.5rem 0.6rem;
        font-size: 0.78rem;
      }

      .step-item strong {
        font-size: 0.9rem;
      }

      .sync-table {
        font-size: 0.75rem;
      }

      .sync-table th,
      .sync-table td {
        padding: 0.35rem 0.3rem;
      }

      .log-box {
        height: 50vh;
        min-height: 240px;
        font-size: 0.72rem;
      }

      .env-editor {
        min-height: 280px;
        font-size: 0.75rem;
      }

      .toast {
        min-width: 200px;
        max-width: calc(100vw - 2rem);
        font-size: 0.82rem;
      }

      .toast-stack {
        top: 0.5rem;
        right: 0.5rem;
        left: 0.5rem;
      }

      select {
        max-width: 50vw;
      }
    }

    /* 超窄屏：≤400px 户号下拉折行 */
    @media (max-width: 400px) {
      .toolbar {
        flex-direction: column;
        align-items: stretch;
        gap: 0.4rem;
      }

      .tabs {
        justify-content: space-between;
      }

      select {
        max-width: 100%;
      }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      /* 卡片相对深色页面"抬升"：一道柔和阴影 + 顶部 1px 高光，形成明确层级 */
      box-shadow: 0 1px 2px var(--card-shadow), 0 0 0 1px rgba(255, 255, 255, 0.02);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    /* 数据看板不需要"卡片浮起来"的炫技：hover 仅边框微变，阴影保持静态 */
    .card:hover {
      border-color: var(--card-hover-border);
    }

    /* 卡片标题：图标 + 文字，靠字重/颜色区分层级。去掉 AI 风的左侧色条装饰 */
    .card h2 {
      font-size: 0.98rem;
      color: var(--text);
      margin-bottom: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      line-height: 1.35;
    }

    /* 标题内图标：弱化为 muted 色，不再用 accent 色抢戏 */
    .card h2 svg {
      width: 1.05em;
      height: 1.05em;
      flex: 0 0 auto;
      color: var(--muted);
    }

    /* 副标题(户号/月份/balance_log)保持弱化灰色；用 .sub 标记避免影响 step-badge 等 */
    .card h2 .sub {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.88rem;
    }

    .card h2.step-card-head {
      display: flex;
    }

    .stats {
      display: grid;
      /* 8 张指标卡：最小 160px 保证主数字 + 单位不折行 */
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.6rem;
    }

    .stat {
      background: var(--stat-bg);
      border-radius: 10px;
      padding: 0.7rem 0.85rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
      border: 1px solid transparent;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    /* 数据卡无需悬停位移：仅背景/边框微变 */
    .stat:hover {
      border-color: var(--border);
      background: var(--surface-deep);
    }

    /* 色彩状态用左侧 3px 强调条突出，类似 APP 卡片 */
    .stat.good {
      border-left: 3px solid var(--accent2);
      padding-left: calc(0.85rem - 2px);
    }

    .stat.bad {
      border-left: 3px solid var(--danger);
      padding-left: calc(0.85rem - 2px);
    }

    .stat.warn {
      border-left: 3px solid var(--warn);
      padding-left: calc(0.85rem - 2px);
    }

    .stat .label {
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.35rem;
      white-space: nowrap;
      overflow: hidden;
    }

    .stat .label svg {
      width: 0.95em;
      height: 0.95em;
      opacity: 0.85;
      flex: 0 0 auto;
    }

    .stat .label span {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat .value {
      font-size: 1.3rem;
      font-weight: 600;
      line-height: 1.2;
      /* 关键读数用等宽字体，像电表/计量面板 */
      font-family: "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
      font-variant-numeric: tabular-nums;
    }

    /* 辅标：金额/环比等次要信息，小号 muted，不抢主数字 */
    .stat .extra {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.5;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    /* 内联标签：已交清 等状态文字 */
    .value-tag {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 5px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
    }

    .value-tag.ok {
      background: var(--success-bg);
      color: var(--success-fg);
    }

    .stat .value small {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 400;
    }

    .stat.good .value {
      color: var(--accent2);
    }

    .stat.bad .value {
      color: var(--danger);
    }

    .stat.warn .value {
      color: var(--warn);
    }

    /* 环比标签：内联在 extra 里，不再独占一行 */
    .stat .delta {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.05rem 0.35rem;
      border-radius: 4px;
    }

    .stat .delta.up {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.12);
    }

    .stat .delta.down {
      color: var(--accent2);
      background: rgba(0, 113, 107, 0.12);
    }

    .log-box {
      background: var(--surface-deep);
      border-radius: 8px;
      padding: 0.75rem;
      height: calc(100vh - 220px);
      min-height: 360px;
      overflow: auto;
      font-family: Consolas, monospace;
      font-size: 0.78rem;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--log-text);
    }

    .sync-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }

    .sync-table th,
    .sync-table td {
      border-bottom: 1px solid var(--border);
      padding: 0.45rem 0.5rem;
      text-align: left;
      font-variant-numeric: tabular-nums;
    }

    .sync-table th {
      color: var(--muted);
      font-weight: 500;
    }

    .log-user-group {
      margin-bottom: 1.25rem;
    }

    .log-user-group h3 {
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .log-user-group h3 span {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.82rem;
    }

    .status-pill {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      font-size: 0.75rem;
      background: var(--pill-bg);
      white-space: nowrap;
    }

    /* 状态栏：让整行(文本/数据库图标/状态胶囊)共享同一垂直中心线，避免错位 */
    header .meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.3rem;
      line-height: 1.5;
    }

    /* 数据库类型块：图标 + 名称垂直居中 */
    header .meta .meta-db {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* 品牌图标(填充)：与文字基线对齐，尺寸匹配文字 x-height */
    header .meta .meta-db svg,
    header .meta .meta-db .db-brand-icon {
      width: 0.95em;
      height: 0.95em;
      flex: 0 0 auto;
      display: block;
    }

    /* 状态胶囊：与同行文本垂直居中(原来 inline-block 导致顶部偏高) */
    header .meta .status-pill {
      vertical-align: middle;
      line-height: 1.4;
    }

    .status-pill.running {
      background: var(--warn-bg);
      color: var(--warn);
    }

    .status-pill.running::before {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--warn);
      border-radius: 50%;
      margin-right: 0.3rem;
      vertical-align: 1px;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .status-pill.success {
      background: var(--success-bg);
      color: var(--success-fg);
    }

    .status-pill.failed {
      background: var(--danger-bg);
      color: var(--danger);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .chart-wrap {
      position: relative;
      height: 260px;
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
    }

    .chart-wrap canvas {
      display: block;
      max-width: 100%;
    }

    .chart-wrap.tall {
      height: 300px;
    }

    .grid-2 .span-full {
      grid-column: 1 / -1;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
    }

    .tab-btn {
      background: transparent;
      border: 1px solid var(--border);
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .tab-btn svg {
      width: 1em;
      height: 1em;
      flex: 0 0 auto;
    }

    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: grid;
      gap: 1rem;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .env-editor {
      width: 100%;
      min-height: 420px;
      background: var(--surface-deep);
      color: var(--log-text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      font-family: Consolas, monospace;
      font-size: 0.82rem;
      line-height: 1.45;
      resize: vertical;
    }

    .env-meta,
    .hint {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .hint {
      margin-top: 0.5rem;
    }

    .env-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .chart-wrap.step-pie {
      position: relative;
      height: 196px;
    }

    .step-pie-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      text-align: center;
      gap: 0.15rem;
      z-index: 1;
    }

    .step-pie-center .pct {
      font-size: 1.45rem;
      font-weight: 700;
      line-height: 1.1;
      color: var(--text);
      font-family: "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
      font-variant-numeric: tabular-nums;
    }

    .step-pie-center .sub {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .step-pie-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .step-pie-stat {
      padding: 0.55rem 0.65rem;
      border-radius: 10px;
      background: var(--stat-bg);
      border: 1px solid var(--border);
    }

    .step-pie-stat .label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .step-pie-stat .label i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .step-pie-stat strong {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      font-family: "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
      font-variant-numeric: tabular-nums;
    }

    .step-pie-stat .unit {
      font-size: 0.72rem;
      color: var(--muted);
      margin-left: 0.15rem;
    }

    #stepCard .step-card-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem 0.5rem;
      line-height: 1.35;
    }

    .step-title-extra {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem 0.55rem;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--muted);
      width: 100%;
      margin-top: 0.15rem;
    }

    .step-cap-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .step-cap-chip i {
      width: 9px;
      height: 9px;
      border-radius: 2px;
      flex: 0 0 auto;
    }

    .step-cap-total {
      color: var(--muted);
    }

    .step-cap-total strong {
      color: var(--text);
      font-weight: 600;
    }

    .step-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.75rem;
    }

    .step-item {
      background: var(--stat-bg);
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
      font-size: 0.85rem;
    }

    .step-item .title {
      color: var(--muted);
      font-size: 0.75rem;
      margin-bottom: 0.25rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .step-item strong {
      font-weight: 700;
      color: var(--text);
      font-size: 1rem;
      font-family: "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
      font-variant-numeric: tabular-nums;
    }

    .step-bar {
      height: 6px;
      background: var(--surface-deep);
      border-radius: 3px;
      margin-top: 0.5rem;
      overflow: hidden;
    }

    .step-bar>div {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent2) 0%, var(--accent) 60%, var(--warn) 85%, var(--danger) 100%);
      transition: width 0.5s ease;
    }

    .step-bar.split>div:nth-child(1) {
      background: var(--accent2);
    }

    .step-bar.split>div:nth-child(2) {
      background: var(--accent);
    }

    .step-bar.split>div:nth-child(3) {
      background: var(--warn);
    }

    .step-item.step-current {
      border: 1px solid var(--accent2);
      background: color-mix(in srgb, var(--accent2) 8%, var(--stat-bg));
    }

    .step-item.step-current .title {
      color: var(--accent2);
      font-weight: 600;
    }

    .step-highlight {
      grid-column: 1 / -1;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      border: 1px solid color-mix(in srgb, var(--accent2) 40%, var(--border));
      background: color-mix(in srgb, var(--accent2) 6%, var(--stat-bg));
    }

    .step-highlight .step-main {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.5rem 1.25rem;
      margin-top: 0.35rem;
    }

    .step-highlight .step-main strong {
      font-size: 1.25rem;
    }

    .step-badge {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 6px;
      background: var(--step-badge-bg);
      color: var(--step-badge-text);
      font-size: 0.75rem;
      margin-left: 0.35rem;
    }

    .banner {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--banner-warn-border);
      background: var(--banner-warn-bg);
      color: var(--banner-warn-text);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .banner svg {
      flex: 0 0 auto;
      width: 1.1em;
      height: 1.1em;
    }

    .banner.info {
      border-color: var(--banner-info-border);
      background: var(--banner-info-bg);
      color: var(--banner-info-text);
    }

    /* Toast 通知 */
    .toast-stack {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
      max-width: calc(100vw - 2rem);
    }

    .toast {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 0.7rem 1rem;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.45);
      font-size: 0.88rem;
      color: var(--text);
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
      min-width: 240px;
      max-width: 380px;
      pointer-events: auto;
      animation: toastIn 0.25s ease;
    }

    .toast.success {
      border-left-color: var(--accent2);
    }

    .toast.error {
      border-left-color: var(--danger);
    }

    .toast.warn {
      border-left-color: var(--warn);
    }

    .toast.info {
      border-left-color: var(--info);
    }

    .toast svg {
      width: 1.05em;
      height: 1.05em;
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .toast.success svg {
      color: var(--accent2);
    }

    .toast.error svg {
      color: var(--danger);
    }

    .toast.warn svg {
      color: var(--warn);
    }

    .toast.info svg {
      color: var(--info);
    }

    .toast .toast-msg {
      flex: 1;
    }

    .toast .toast-x {
      cursor: pointer;
      color: var(--muted);
      /* 命中区扩到 ≥44px：透明 padding 撑开 hit area，视觉符号不变 */
      padding: 0.5rem;
      margin: -0.5rem -0.25rem -0.5rem 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      box-sizing: border-box;
      border-radius: 6px;
    }

    .toast .toast-x:hover {
      color: var(--text);
      background: var(--pill-bg);
    }

    .toast.leaving {
      animation: toastOut 0.25s ease forwards;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateX(20px);
      }
    }

    /* 自定义确认对话框 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--modal-overlay);
      backdrop-filter: blur(4px);
      animation: fadeIn 0.15s ease;
    }

    .modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.25rem 1rem;
      width: min(380px, 92vw);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .modal-box .modal-msg {
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .modal-actions button {
      min-height: 40px;
      padding: 0.4rem 1rem;
    }

    /* 日志面板内联操作按钮：保证最小命中高度，移动端 ≥44px */
    .card h2 button {
      min-height: 40px;
    }

    @media (max-width: 720px) {
      .card h2 button,
      .modal-actions button {
        min-height: 44px;
      }
    }

    /* 骨架屏 */
    .skeleton {
      background: linear-gradient(90deg, var(--skeleton-a) 0%, var(--skeleton-b) 50%, var(--skeleton-a) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.3s linear infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      from {
        background-position: 200% 0;
      }

      to {
        background-position: -200% 0;
      }
    }

    /* 减少动画偏好(CRITICAL)：尊重系统 prefers-reduced-motion，关闭所有装饰性动效 */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }

      /* 骨架屏 shimmer 降级为静态灰块，仍保留"加载中"占位语义 */
      .skeleton {
        animation: none !important;
      }

      /* 同步中的旋转图标停止旋转 */
      #refreshBtn.spinning svg,
      #fetchBtn.spinning svg {
        animation: none !important;
      }

      /* 运行中状态点的脉冲停止 */
      .status-pill.running::before {
        animation: none !important;
      }
    }

    .skeleton-line {
      height: 12px;
      margin-bottom: 8px;
    }

    .skeleton-line.short {
      width: 60%;
    }

    .skel-stat {
      background: var(--stat-bg);
      border-radius: 10px;
      padding: 0.85rem 0.95rem;
    }

    .skel-stat .skeleton {
      height: 12px;
      margin-bottom: 8px;
    }

    .login-overlay {
      position: fixed;

      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;

      background: var(--bg);
    }

    .login-box {
      position: relative;
      width: min(400px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem 2rem 1.75rem;
      box-shadow: 0 8px 30px var(--card-shadow);
    }

    .login-brand {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .login-logo {
      width: 88px;
      height: 88px;
      margin: 0 auto 1rem;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.18));
    }

    .login-brand h2 {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      /* 纯色标题文字，去掉渐变填充(渐变标题是典型 AI/SaaS 观感) */
      color: var(--text);
    }

    .login-brand .sub {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 0.35rem;
    }

    .login-field {
      margin-bottom: 1rem;
    }

    .login-field label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .login-field input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      background: var(--login-input-bg);
      border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .login-field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    /* 登录框已有自定义焦点阴影，:focus-visible 复用同一视觉，避免双重焦点环 */
    .login-field input:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    .login-box .err {
      color: var(--danger);
      font-size: 0.82rem;
      min-height: 1.25rem;
      margin-bottom: 0.5rem;

    /* 登录按钮：纯色填充，去掉渐变 + 发光阴影(典型 AI/SaaS demo 配方) */
    .login-box .login-submit {

</head>

  <script>
    Chart.register(ChartDataLabels);
    const $ = (id) => document.getElementById(id);
    let dailyComboChart, monthlyChart, stepPieChart;
    let stepPieRenderToken = 0;
    let sessionToken = sessionStorage.getItem("dashboard_session") || "";
    let loginRequired = false;
    let dbEnabled = true;
    let activeTab = "monitor";

    /* 减少动画偏好(CRITICAL)：尊重系统 prefers-reduced-motion，图表入场动画降级为 0 */
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
    const reducedMotion = () => prefersReducedMotion.matches;
    /* 统一图表动画时长：reduced-motion 时为 0，否则用各自默认值 */
    const chartAnim = (duration) => reducedMotion() ? 0 : duration;
    /* 全局默认：未显式配置动画的图表(daily/monthly 柱状图)也跟随 reduced-motion。
       仅设 Chart.defaults.animation.duration（该属性存在）；不要访问
       defaults.animations.colors / .y —— 它们在 Chart.js 4 中不是顶层默认对象，
       访问会抛 TypeError 并导致整个脚本中止。 */
    Chart.defaults.animation.duration = chartAnim(1000);
    let logTimer = null;
    let statusTimer = null;
    let cooldownTimer = null;
    let lastSummary = null;
    let lastDailyData = [];
    let lastMonthlyData = [];
    let themeMedia = null;

    /* 主题：system（跟随系统）/ light / dark，偏好存 localStorage */
    function resolveTheme(mode) {
      if (mode === "system") {
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      return mode === "light" ? "light" : "dark";
    }

    function applyTheme(mode, { rerenderCharts = true } = {}) {
      const resolved = resolveTheme(mode);
      document.documentElement.setAttribute("data-theme", resolved);
      document.documentElement.setAttribute("data-theme-mode", mode);
      localStorage.setItem("dashboard_theme", mode);
      const titles = { system: "主题：跟随系统", light: "主题：浅色", dark: "主题：深色" };
      const btn = $("themeBtn");
      if (btn) btn.title = titles[mode] + "（点击切换）";
      /* 切换主题后恢复该主题对应的自定义底色（深/浅各自独立保存） */
      restoreCustomBg(resolved);
      if (rerenderCharts && lastDailyData.length) renderDailyComboChart(lastDailyData);
      if (rerenderCharts && lastMonthlyData.length) renderMonthlyChart(lastMonthlyData);
      if (rerenderCharts && lastSummary && hasStepData(lastSummary)) renderStepCard(lastSummary);
      /* 通知 popover 等订阅者：主题已变，预设需跟随刷新 */
      document.documentElement.dispatchEvent(new CustomEvent("data-theme-change", { detail: { resolved } }));
    }

    /* 自定义背景色：深/浅主题各存一个 key，切换主题时互不干扰。
       只注入 --bg-custom，其余表面色由 CSS color-mix 自动派生。 */
    const BG_DEFAULTS = { dark: "#1c1c1c", light: "#f5f6f8" };
    const bgKeyOf = (resolved) => "dashboard_bg_" + resolved;

    function applyCustomBg(hex, { persist = true } = {}) {
      if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
      const root = document.documentElement;
      root.style.setProperty("--bg-custom", hex);
      const swatch = $("bgColorSwatch");
      if (swatch) swatch.style.background = hex;
      const picker = $("bgColorPicker");
      if (picker) picker.value = hex;
      const meta = document.getElementById("themeColorMeta");
      if (meta) meta.content = hex;
      if (persist) {
        const resolved = root.getAttribute("data-theme") || "dark";
        localStorage.setItem(bgKeyOf(resolved), hex);
      }
      /* 图表 tooltip/grid 读 CSS 变量，重渲染后自动跟随新底色 */
      if (lastDailyData.length) renderDailyComboChart(lastDailyData);
      if (lastMonthlyData.length) renderMonthlyChart(lastMonthlyData);
      if (lastSummary && hasStepData(lastSummary)) renderStepCard(lastSummary);
    }

    /* 切换主题时，恢复该主题保存的自定义底色；无则用默认值 */
    function restoreCustomBg(resolved) {
      const saved = localStorage.getItem(bgKeyOf(resolved));
      applyCustomBg(saved || BG_DEFAULTS[resolved], { persist: false });
    }

    function cycleTheme() {
      const order = ["system", "light", "dark"];
      const cur = document.documentElement.getAttribute("data-theme-mode") || localStorage.getItem("dashboard_theme") || "system";
      const next = order[(order.indexOf(cur) + 1) % order.length];
      applyTheme(next);
    }

    function initTheme() {
      const mode = localStorage.getItem("dashboard_theme") || "system";
      applyTheme(mode, { rerenderCharts: false });
      themeMedia = window.matchMedia("(prefers-color-scheme: dark)");
      themeMedia.addEventListener("change", () => {
        if ((document.documentElement.getAttribute("data-theme-mode") || "system") === "system") {
          applyTheme("system");
        }
      });
    }

    function chartTheme() {
      const s = getComputedStyle(document.documentElement);
      return {
        muted: s.getPropertyValue("--chart-muted").trim() || "#8b9cb3",
        grid: s.getPropertyValue("--chart-grid").trim() || "rgba(45,58,79,0.3)",
        label: s.getPropertyValue("--chart-label").trim() || "#e7ecf3",
        barLabel: s.getPropertyValue("--bar-label").trim() || "#fff",
        tooltipBg: s.getPropertyValue("--chart-tooltip-bg").trim(),
        tooltipTitle: s.getPropertyValue("--chart-tooltip-title").trim(),
        tooltipBody: s.getPropertyValue("--chart-tooltip-body").trim(),
        tooltipBorder: s.getPropertyValue("--chart-tooltip-border").trim(),
        pointBorder: s.getPropertyValue("--chart-point-border").trim() || "#0f1419",
      };
    }

    function buildChartTooltip() {
      const t = chartTheme();
      return {
        backgroundColor: t.tooltipBg, titleColor: t.tooltipTitle, bodyColor: t.tooltipBody,
        borderColor: t.tooltipBorder, borderWidth: 1, padding: 10, cornerRadius: 8, boxPadding: 4,

    /* 柱状图垂直渐变：上亮下暗，模拟立体高光，去掉死板描边。
       Chart.js scriptable backgroundColor 在每次绘制时回调，传入 ctx 可取 chart Area。
       返回 CanvasGradient 实例，Chart.js 原生支持。 */
    function makeBarGradient(ctx, hex, { topAlpha = 1, bottomAlpha = 0.55 } = {}) {
      const { chart } = ctx;
      const { ctx: c, chartArea } = chart;
      if (!chartArea) return hex; // 首帧 chartArea 未就绪，回退纯色避免报错
      const top = Math.max(0, chartArea.top);
      const bottom = Math.max(top + 1, chartArea.bottom);
      const g = c.createLinearGradient(0, top, 0, bottom);
      const { r, g: gg, b } = hexToRgb(hex);
      g.addColorStop(0, `rgba(${r},${gg},${b},${topAlpha})`);
      g.addColorStop(1, `rgba(${r},${gg},${b},${bottomAlpha})`);
      return g;
    }

    /* Toast 通知系统：右上角浮层提示，自动消失，替代原生 alert */
    function toast(msg, type = "info", ms = 3200) {
      const stack = $("toastStack");
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      /* 错误类 toast 用 role=alert 即时播报(WCAG aria-live-errors)；其余走容器的 polite */
      if (type === "error") el.setAttribute("role", "alert");
      const iconName = type === "success" ? "ok" : type === "error" ? "err" : type === "warn" ? "warn" : "info";
      el.innerHTML = `${ICONS[iconName] || ICONS.info}<div class="toast-msg"></div><span class="toast-x">×</span>`;
      el.querySelector(".toast-msg").textContent = msg;
      stack.appendChild(el);
      const close = () => { el.classList.add("leaving"); setTimeout(() => el.remove(), 250); };
      el.querySelector(".toast-x").onclick = close;
      setTimeout(close, ms);
    }

    /* 自定义确认对话框，替代原生 confirm，返回 Promise<boolean> */
    function confirmBox(msg, { okText = "确定", cancelText = "取消", danger = false } = {}) {
      return new Promise(resolve => {
        const overlay = document.createElement("div");
        overlay.className = "modal-overlay";
        overlay.setAttribute("role", "dialog");
        overlay.setAttribute("aria-modal", "true");
        overlay.setAttribute("aria-label", "确认操作");
        overlay.innerHTML = `<div class="modal-box"><div class="modal-msg"></div><div class="modal-actions"><button class="modal-cancel">${cancelText}</button><button class="primary modal-ok">${okText}</button></div></div>`;
        overlay.querySelector(".modal-msg").textContent = msg;
        if (danger) overlay.querySelector(".modal-ok").style.background = "var(--danger)";
        /* 记录打开对话框前的焦点，关闭后归还(WCAG focus-management) */
        const previouslyFocused = document.activeElement;
        document.body.appendChild(overlay);
        const done = (v) => {
          overlay.remove();
          if (previouslyFocused && typeof previouslyFocused.focus === "function") previouslyFocused.focus();
          resolve(v);
        };
        const cancelBtn = overlay.querySelector(".modal-cancel");
        const okBtn = overlay.querySelector(".modal-ok");
        cancelBtn.onclick = () => done(false);
        okBtn.onclick = () => done(true);
        overlay.onclick = (e) => { if (e.target === overlay) done(false); };
        /* 对话框内焦点循环：Tab 在两个按钮间往返 */
        overlay.addEventListener("keydown", function trap(ev) {
          if (ev.key === "Tab") {
            ev.preventDefault();
            (document.activeElement === okBtn ? cancelBtn : okBtn).focus();
          }
        });
        document.addEventListener("keydown", function esc(ev) { if (ev.key === "Escape") { done(false); document.removeEventListener("keydown", esc); } });
        /* 打开后立即聚焦，屏幕阅读器/键盘可用 */
        requestAnimationFrame(() => cancelBtn.focus());
      });
    }

    function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

    /* 相对时间：把 yyyy-mm-dd hh:mm:ss 转成 "X 小时前" 等 */
    function relTime(s) {
      if (!s) return "";
      const t = new Date(s.replace(" ", "T"));
      if (isNaN(t)) return s;
      const diff = (Date.now() - t.getTime()) / 1000;
      if (diff < 60) return "刚刚";
      if (diff < 3600) return Math.floor(diff / 60) + " 分钟前";
      if (diff < 86400) return Math.floor(diff / 3600) + " 小时前";
      if (diff < 2592000) return Math.floor(diff / 86400) + " 天前";
      return s.slice(0, 10);
    }

    const labelFmt = (v) => {
      if (v === null || v === undefined || v === "") return "";
      const n = Number(v);
      if (!Number.isFinite(n) || n === 0) return "";
      return n >= 100 ? n.toFixed(0) : n.toFixed(1);
    };
    const barLabelFmt = (v) => {
      if (v === null || v === undefined || v === "") return "";
      const n = Number(v);
      if (!Number.isFinite(n) || n === 0) return "";
      return n >= 10 ? n.toFixed(0) : n.toFixed(1);
    };

    function headers() {
      const h = { "Content-Type": "application/json" };
      if (sessionToken) h["X-Dashboard-Session"] = sessionToken;
      return h;
    }

    async function api(path, opts = {}) {
      const res = await fetch("./" + path.replace(/^\//, ""), { ...opts, headers: { ...headers(), ...(opts.headers || {}) } });
      if (res.status === 401) {
        sessionStorage.removeItem("dashboard_session");
        sessionToken = "";
        showLogin(true);
        throw new Error("请先登录");
      }
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || res.statusText);
      }
      return res.json();
    }

    function showLogin(show) {
      $("loginOverlay").classList.toggle("hidden", !show);
      $("logoutBtn").classList.toggle("hidden", show || !loginRequired);
    }

    async function doLogin() {
      $("loginError").textContent = "";
      const btn = $("loginBtn");
      const origText = btn.textContent;
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner" style="border-color:#fff;border-right-color:transparent"></span>登录中...`;
      try {
        const r = await fetch("./api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: $("loginPassword").value }),
        });
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          $("loginError").textContent = err.detail || "登录失败";
          return;
        }
        const data = await r.json();
        sessionToken = data.token || "ok";
        sessionStorage.setItem("dashboard_session", sessionToken);
        showLogin(false);
        await bootstrap();
      } catch (e) {
        $("loginError").textContent = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = origText;
      }
    }

    function fmtNum(v, unit = "") {
      if (v === null || v === undefined || v === "") return "—";
      return Number(v).toLocaleString("zh-CN", { maximumFractionDigits: 2 }) + (unit ? " " + unit : "");
    }

    /* 阶梯电量：四舍五入为整数 kWh */
    function fmtStepNum(v, unit = "") {
      if (v === null || v === undefined || v === "") return "—";
      const n = Math.round(Number(v));
      if (!Number.isFinite(n)) return "—";
      return n.toLocaleString("zh-CN", { maximumFractionDigits: 0 }) + (unit ? " " + unit : "");
    }
    function fmtBold(v, unit = "") {
      if (v === null || v === undefined || v === "") return "—";
      const n = Number(v).toLocaleString("zh-CN", { maximumFractionDigits: 2 });
      return `<strong>${n}</strong>${unit ? " " + unit : ""}`;
    }

    function updateDbBanner(st) {
      dbEnabled = st.db_enabled !== false;
      const banner = $("dbBanner");
      const setBanner = (text) => { banner.className = "banner"; banner.innerHTML = `${ICONS.warn}${escapeHtml(text)}`; banner.classList.remove("hidden"); };
      if (!dbEnabled) {
        setBanner("数据库连接失败，请检查连接参数与数据库服务。");
        $("rowStepMonthly").classList.add("hidden");
        $("dailyComboCard").classList.add("hidden");
        $("monitorCard").classList.add("hidden");
        return;
      }
      if (!st.db_available) {
        setBanner("数据库已配置但无法连接，请检查连接参数与数据库服务。");
      } else {
        banner.classList.add("hidden");
      }
      $("rowStepMonthly").classList.remove("hidden");
      $("dailyComboCard").classList.remove("hidden");
      $("monitorCard").classList.remove("hidden");
    }

    /* 当前阶梯配置：已用 / 剩余（仅当前阶段） */
    function getCurrentStepCfg(st) {
      const stage = Number(st.step_stage) || 1;
      const names = ["", "第一阶梯", "第二阶梯", "第三阶梯"];
      /* 阶梯三段递进色阶：国网绿(正常档) → 青(第二档) → 橙(高档/超量)，统一在低饱和基调内 */
      const palette = {
        1: { used: "#00716b", remain: "#0d8a83" },
        2: { used: "#0ea5e9", remain: "#38bdf8" },
        3: { used: "#f59e0b", remain: "#fbbf24" },
      };
      const ri = (v) => (v != null ? Math.round(Number(v)) : null);
      const row = {
        1: { used: Math.round(Number(st.used_step1) || 0), remain: ri(st.remain_step1) },
        2: { used: Math.round(Number(st.used_step2) || 0), remain: ri(st.remain_step2) },
        3: { used: Math.round(Number(st.used_step3) || 0), remain: null },
      }[stage] || { used: Math.round(Number(st.used_step1) || 0), remain: ri(st.remain_step1) };
      const colors = palette[stage] || palette[1];
      const hasRemain = row.remain != null && row.remain >= 0 && stage < 3;
      const capacity = hasRemain ? row.used + row.remain : 0;
      const pct = hasRemain && capacity > 0 ? Math.min(100, (row.used / capacity) * 100) : null;
      return { stage, label: names[stage], ...row, colors, hasRemain, capacity, pct };
    }

    /* 阶梯数据：数据库有记录且非电动车户才展示饼图 */
    function hasStepData(s) {
      const st = s && s.step_data;
      if (!st) return false;
      const name = s.user_name || "";
      if (/电动车|充电/.test(name)) return false;
      return true;
    }

    function reflowMonitorCharts() {
      if (monthlyChart) monthlyChart.resize();
      if (stepPieChart) stepPieChart.resize();
      if (dailyComboChart) dailyComboChart.resize();
    }

    /* 阶梯卡片显隐会改变月图表列宽，需等 grid 布局稳定后再绘制/resize */
    function scheduleMonitorChartsPaint({ daily = true, monthly = true } = {}) {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (daily && lastDailyData.length) renderDailyComboChart(lastDailyData);
          if (monthly && lastMonthlyData.length) renderMonthlyChart(lastMonthlyData);
          reflowMonitorCharts();
        });
      });
    }

    function destroyStepPieChart() {
      if (stepPieChart) {
        stepPieChart.destroy();
        stepPieChart = null;
      }
    }

    function fmtStepPeriod(st) {
      if (!st) return "—";
      if (st.stat_month && st.live_adjusted && st.live_extra_kwh > 0) {
        return st.year_month || `${st.stat_month} ~ 当月`;

      return st.year_month || st.stat_month || "—";

    function buildStepTitleExtra(cfg, st) {
      const el = $("stepTitleExtra");
      const liveHtml = st && st.live_adjusted && st.live_extra_kwh > 0
        ? `<span class="step-cap-total">含实时 <strong>+${fmtStepNum(st.live_extra_kwh)}</strong> kWh</span>`
        : "";
      if (!cfg.hasRemain || !cfg.capacity) {
        if (liveHtml) {
          el.classList.remove("hidden");
          el.innerHTML = liveHtml;

        return;
      }
      el.classList.remove("hidden");
      el.innerHTML = `
        <span class="step-cap-chip"><i style="background:${cfg.colors.used}"></i>已用</span>
        <span class="step-cap-chip"><i style="background:${colorMixAlpha(cfg.colors.remain, 0.55)}"></i>剩余</span>
        <span class="step-cap-total">本阶额度 <strong>${fmtStepNum(cfg.capacity)}</strong> kWh</span>${liveHtml}`;
    }

    function paintStepPieChart(st, cfg) {
      const ct = chartTheme();
      const pieLabels = cfg.hasRemain ? ["已用", "剩余"] : ["已用"];
      const pieData = cfg.hasRemain ? [cfg.used, cfg.remain] : [cfg.used || 1];
      const pieColors = cfg.hasRemain
        ? [cfg.colors.used, colorMixAlpha(cfg.colors.remain, 0.35)]
        : [cfg.colors.used];

      destroyStepPieChart();
      stepPieChart = upsertChart(null, $("stepPieChart"), {
        type: "doughnut",
        data: {
          labels: pieLabels,
          datasets: [{
            data: pieData,
            backgroundColor: pieColors,
            borderColor: ct.pointBorder,
            borderWidth: 1,
            hoverOffset: 8,
            spacing: cfg.hasRemain ? 3 : 0,
            borderRadius: cfg.hasRemain ? 6 : 0,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: "72%",
          layout: { padding: 4 },
          animation: { duration: chartAnim(350) },
          plugins: {
            legend: { display: false },
            tooltip: {
              ...buildChartTooltip(),
              callbacks: {
                label(ctx) {
                  const v = ctx.parsed || 0;
                  if (cfg.hasRemain && cfg.capacity > 0) {
                    const p = ((v / cfg.capacity) * 100).toFixed(1);
                    return ` ${ctx.label}: ${fmtStepNum(v)} kWh (${p}%)`;
                  }
                  return ` ${ctx.label}: ${fmtStepNum(v)} kWh`;
                },
              },
            },

    function renderStepCard(s) {
      const card = $("stepCard");
      const rowEl = $("rowStepMonthly");
      const st = s.step_data;
      stepPieRenderToken += 1;
      const token = stepPieRenderToken;

      if (!hasStepData(s)) {
        card.classList.add("hidden");
        rowEl.classList.remove("has-step");
        destroyStepPieChart();
        $("stepLegend").innerHTML = "";
        $("stepPieCenter").innerHTML = "";
        $("stepTitleExtra").classList.add("hidden");
        $("stepTitleExtra").innerHTML = "";
        scheduleMonitorChartsPaint({ daily: false });
        return;
      }

      card.classList.remove("hidden");
      rowEl.classList.add("has-step");
      $("stepMonth").textContent = fmtStepPeriod(st);

      const cfg = getCurrentStepCfg(st);
      $("stepStage").textContent = cfg.label;
      buildStepTitleExtra(cfg, st);

      const centerHtml = cfg.hasRemain && cfg.pct != null
        ? `<div class="pct">${cfg.pct.toFixed(0)}%</div><div class="sub">本阶已用占比</div>`
        : `<div class="pct" style="font-size:1.12rem">${fmtStepNum(cfg.used)}</div><div class="sub">kWh · ${cfg.label}</div>`;
      $("stepPieCenter").innerHTML = centerHtml;

      const remainBlock = cfg.hasRemain
        ? `<div class="step-pie-stat"><div class="label"><i style="background:${colorMixAlpha(cfg.colors.remain, 0.55)}"></i>剩余</div><div><strong>${fmtStepNum(cfg.remain)}</strong><span class="unit">kWh</span></div></div>`
        : `<div class="step-pie-stat"><div class="label"><i style="background:${colorMixAlpha(cfg.colors.remain, 0.55)}"></i>剩余</div><div><strong>—</strong><span class="unit">${cfg.stage >= 3 ? "无配额" : ""}</span></div></div>`;

      $("stepLegend").innerHTML = `
        <div class="step-pie-stat"><div class="label"><i style="background:${cfg.colors.used}"></i>已用</div><div><strong>${fmtStepNum(cfg.used)}</strong><span class="unit">kWh</span></div></div>
        ${remainBlock}`;

      destroyStepPieChart();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (token !== stepPieRenderToken || !hasStepData(lastSummary)) return;
          paintStepPieChart(st, getCurrentStepCfg(lastSummary.step_data));
          scheduleMonitorChartsPaint({ daily: false });
        });
      });
    }

    function colorMixAlpha(hex, alpha) {
      const h = hex.replace("#", "");
      const r = parseInt(h.slice(0, 2), 16);
      const g = parseInt(h.slice(2, 4), 16);
      const b = parseInt(h.slice(4, 6), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    /* 当月分时：总量放标题，数值区只展示谷/峰 */
    function touTotalKwh(tou) {
      if (!tou) return null;
      let total = tou.total_usage != null ? Number(tou.total_usage) : null;
      if (total == null || !Number.isFinite(total)) {
        total = [tou.valley, tou.flat, tou.peak, tou.tip].reduce((s, v) => s + (Number(v) || 0), 0);
        if (total <= 0) total = null;
      }
      return total;
    }

    /* 概览卡片：阶梯数据已在右侧饼图展示，此处不再重复 */

    /* 计算环比变化：current 与 previous 的百分比差，返回 {text, cls} 或 null */
    function deltaPct(cur, prev, invertColor = false) {
      if (cur == null || prev == null || Number(prev) === 0) return null;
      const c = Number(cur), p = Number(prev);
      if (!Number.isFinite(c) || !Number.isFinite(p)) return null;
      const pct = ((c - p) / p) * 100;
      if (!Number.isFinite(pct) || Math.abs(pct) < 0.5) return null;
      const up = pct > 0;
      /* invertColor：用电增加是 bad（红），余额增加是 good（绿） */
      const goodUp = invertColor ? !up : up;
      return { text: `${up ? "↑" : "↓"} ${Math.abs(pct).toFixed(1)}%`, cls: goodUp ? "up" : "down" };
    }

    function renderStats(s) {
      lastSummary = s;
      const tou = s.month_tou_summary || {};
      const touTotal = touTotalKwh(tou);
      const billLabel = s.bill_month ? `${s.bill_month} 账单` : "上月账单";
      const billCharge = s.month_charge != null ? fmtNum(s.month_charge, "元") : "待出账";
      const yearlyLabel = s.yearly_label ? `${s.yearly_label} 年度` : "年度";
      const balanceLabel = s.balance_as_of ? `余额 ${s.balance_as_of.slice(0, 10)}` : "余额";
      const usageLabel = s.last_daily_date ? `最近用电 ${s.last_daily_date}` : "最近用电";
      const balNum = Number(s.balance);
      const balCls = s.balance == null ? "" : (balNum < 0 ? "bad" : balNum < 30 ? "warn" : "good");
      const dueZero = s.amount_due != null && Number(s.amount_due) === 0;
      const dueCls = s.amount_due == null ? "" : (dueZero ? "good" : "bad");
      const dueVal = dueZero ? '<span class="value-tag ok">已交清</span>' : fmtNum(s.amount_due, "元");

      let usageDelta = null, billUsageDelta = null;
      if (lastDailyData.length >= 2) {
        usageDelta = deltaPct(lastDailyData[lastDailyData.length - 1].total_usage, lastDailyData[lastDailyData.length - 2].total_usage);
      }
      if (lastMonthlyData.length >= 2) {
        billUsageDelta = deltaPct(lastMonthlyData[lastMonthlyData.length - 1].total_usage, lastMonthlyData[lastMonthlyData.length - 2].total_usage);
      }
      const deltaHtml = (d) => d ? `<div class="delta ${d.cls}">${d.text} 环比</div>` : "";

      /* 每张卡一个主指标：value 大号主数字，extra 小号辅标。避免长串拼接换行。
         分时拆成 总量/谷/峰 三张独立卡，单指标不再折行。 */
      const items = [
        { label: balanceLabel, icon: ICONS.balance, value: fmtNum(s.balance, "元"), cls: balCls, extra: "" },
        { label: usageLabel, icon: ICONS.usage, value: fmtNum(s.last_daily_usage, "kWh"), cls: "", extra: deltaHtml(usageDelta) },
        { label: billLabel, icon: ICONS.bill, value: fmtNum(s.month_usage, "kWh"), cls: "", extra: billCharge + deltaHtml(billUsageDelta) },
        { label: yearlyLabel, icon: ICONS.year, value: fmtNum(s.yearly_usage, "kWh"), cls: "", extra: s.yearly_charge != null ? fmtNum(s.yearly_charge, "元") : "" },
        { label: "当月总电量", icon: ICONS.tou, value: touTotal != null ? fmtNum(touTotal, "kWh") : "—", cls: "", extra: tou.month || "" },
        { label: "谷电量", icon: ICONS.tou, value: tou.valley != null ? fmtNum(tou.valley, "kWh") : "—", cls: "", extra: "" },
        { label: "峰电量", icon: ICONS.tou, value: tou.peak != null ? fmtNum(tou.peak, "kWh") : "—", cls: "", extra: "" },
        { label: "应交金额", icon: ICONS.due, value: dueVal, cls: dueCls, extra: "" },
      ];
      $("statsGrid").innerHTML = items.map(it =>
        `<div class="stat ${it.cls}"><div class="label">${it.icon || ""}<span>${it.label}</span></div><div class="value">${it.value}</div>${it.extra ? `<div class="extra">${it.extra}</div>` : ""}</div>`
      ).join("");
      $("userTitle").textContent = `${s.user_name || s.user_id} (${s.user_id})`;
      renderStepCard(s);
    }

    function upsertChart(ref, canvas, config) {
      if (ref) ref.destroy();
      canvas.style.width = "";
      canvas.style.height = "";
      return new Chart(canvas, config);
    }

    /* 统一的 tooltip 样式，随主题切换 */
    function smartDatalabel(type, total) {
      const narrow = window.innerWidth < 640;
      const hideAll = narrow && total > 8;
      const hideSome = total > 15;
      const ct = chartTheme();
      return {
        display: (ctx) => {
          const v = ctx.dataset.data[ctx.dataIndex];
          if (v == null || Number(v) === 0) return false;
          if (ctx.dataset.type === "line") return true;
          if (hideAll) {
            const arr = ctx.dataset.data.filter(x => Number(x) > 0);
            const mx = Math.max(...arr);
            return Number(v) === mx;
          }
          if (hideSome) {
            const arr = ctx.dataset.data.filter(x => Number(x) > 0);
            const sorted = [...arr].sort((a, b) => b - a);
            return sorted.indexOf(Number(v)) < 5;
          }
          return true;
        },
        formatter: (v, ctx) => ctx.dataset.type === "line" ? labelFmt(v) : barLabelFmt(v),
        color: (ctx) => ctx.dataset.type === "line" ? ct.label : ct.barLabel,
        font: (ctx) => ({ size: ctx.dataset.type === "line" ? 9 : 8, weight: "600" }),
        anchor: (ctx) => ctx.dataset.type === "line" ? "end" : "center",
        align: (ctx) => ctx.dataset.type === "line" ? "top" : "center",
        offset: (ctx) => ctx.dataset.type === "line" ? 2 : 0,
      };
    }

    /* 骨架屏：在数据加载时显示占位，避免空白闪烁 */
    function showSkeleton() {
      $("statsGrid").innerHTML = Array.from({ length: 5 }).map(() =>
        `<div class="skel-stat"><div class="skeleton"></div><div class="skeleton big"></div></div>`
      ).join("");
      $("userTitle").textContent = "加载中...";
      $("stepLegend").innerHTML = '<div class="skeleton" style="height:48px"></div>';
    }

    /* 错误重试：在目标元素内显示错误信息 + 重试按钮 */
    function showError(target, msg, retryFn) {
      target.innerHTML = `<div class="error-retry">${escapeHtml(msg)} <button class="retry-btn">重试</button></div>`;
      target.querySelector(".retry-btn").onclick = retryFn;

    async function loadUser(userId) {
      if (!userId || !dbEnabled) return;
      showSkeleton();
      const wrap = $("monitorCard");
      try {
        const [summary, daily, monthly] = await Promise.all([
          api(`/api/users/${userId}`),
          api(`/api/users/${userId}/charts/daily?days=30`),
          api(`/api/users/${userId}/charts/monthly?months=12`),
        ]);
        lastDailyData = daily.data || [];
        lastMonthlyData = monthly.data || [];
        renderStats(summary);
        scheduleMonitorChartsPaint();
      } catch (e) {
        showError(wrap, "加载失败：" + e.message, () => loadUser(userId));
        toast(e.message, "error");
      }
    }

    async function loadUsers() {
      const data = await api("/api/users");
      const sel = $("userSelect");
      const cur = sel.value;
      sel.innerHTML = '<option value="">选择户号...</option>' + (data.users || []).map(u =>
        `<option value="${u.user_id}">${u.user_name || u.user_id} (${u.user_id})</option>`).join("");
      if (cur && data.users.some(u => u.user_id === cur)) sel.value = cur;
      else if (data.users.length) { sel.value = data.users[0].user_id; await loadUser(data.users[0].user_id); }
    }

    /* 同步中：旋转原有 SVG 图标，不再额外插入 spinner，避免双图标 */
    function setFetchLoading(loading) {
      const btn = $("fetchBtn");
      const txt = btn.querySelector(".btn-text");
      if (loading) {
        btn.disabled = true;
        btn.classList.add("spinning");
        if (txt) txt.textContent = "同步中...";
      } else {
        btn.classList.remove("spinning");
        if (txt) txt.textContent = "立即同步";
      }
    }

    /* 冷却倒计时：按钮禁用并显示剩余分钟秒 */
    function startCooldown(sec) {
      if (cooldownTimer) clearInterval(cooldownTimer);
      const btn = $("fetchBtn");
      const txt = btn.querySelector(".btn-text");
      btn.disabled = true;
      const tick = () => {
        if (sec <= 0) {
          clearInterval(cooldownTimer);
          cooldownTimer = null;
          btn.classList.remove("spinning");
          if (txt) txt.textContent = "立即同步";
          btn.disabled = !dbEnabled;
          return;
        }
        const m = Math.floor(sec / 60), s = sec % 60;
        if (txt) txt.textContent = `冷却 ${m}:${String(s).padStart(2, "0")}`;
        sec--;
      };
      tick();
      cooldownTimer = setInterval(tick, 1000);
    }

    async function loadStatus() {
      try {
        const st = await api("/api/status");
        updateDbBanner(st);
        const f = st.fetch || {};
        const running = f.status === "running";
        const pillClass = running ? "running" : (f.status === "failed" ? "failed" : (f.status === "success" || f.message ? "success" : ""));
        const syncRel = st.last_sync_at ? relTime(st.last_sync_at) : "尚未同步";
        const srcText = st.last_sync_source ? ` (${st.last_sync_source === "manual" ? "手动" : "定时"})` : "";
        /* 状态中文：idle/running/success/failed → 空闲/同步中/已同步/失败 */
        const statusLabel = statusLabelOf(running ? "running" : f.status);
        /* DB 类型：品牌图标(MySQL/PostgreSQL/SQLite 各自官方色) + 中文名 */
        const dbHtml = `${dbIconHtml(st.db_type)}<span>${dbLabelOf(st.db_type)}</span>`;
        $("statusLine").innerHTML = `上次同步 ${syncRel}${srcText} · <span class="meta-db">${dbHtml}</span> · <span class="status-pill ${pillClass}">${statusLabel}</span> ${escapeHtml(f.message || "")}`;
        setFetchLoading(running);
        if (running) { $("fetchBtn").disabled = true; return; }
        if (!st.can_fetch && !running) {
          const remain = f.cooldown_remaining_sec;
          if (typeof remain === "number" && remain > 0) startCooldown(remain);
          else $("fetchBtn").disabled = true;
        } else if (!cooldownTimer) {
          $("fetchBtn").disabled = !dbEnabled;
        }
      } catch (e) {
        /* 静默失败，避免状态栏闪烁 */
      }
    }

    function renderBalanceLogs(groups) {

        $("syncLogWrap").innerHTML = '<p class="hint">暂无 balance_log 记录，完成一次同步后将在此显示各户号余额写入记录。</p>';

            <thead><tr><th>同步时间</th><th>余额(元)</th><th>应交(元)</th></tr></thead>
            <tbody>${(g.records || []).map(r =>
        `<tr><td>${r.sync_at || "—"}</td><td>${r.balance != null ? r.balance : "—"}</td><td>${r.amount_due != null ? r.amount_due : "—"}</td></tr>`
      ).join("")}</tbody>
          </table>
        </div>`).join("");
    }

    async function loadLogs() {

    function scheduleLogPolling() {
      if (logTimer) clearInterval(logTimer);
      logTimer = null;

    async function refreshAll() {
      await loadStatus();
      if (dbEnabled) await loadUsers();
      if (activeTab === "logs") await loadLogs();
      const uid = $("userSelect").value;
      if (uid && activeTab === "monitor" && dbEnabled) await loadUser(uid);

    /* ===== 背景色 popover ===== */
    /* 预设色：深色主题给深色系，浅色主题给浅色系，切换主题后预设跟随刷新 */
    const BG_PRESETS = {
      dark: ["#1c1c1c", "#0b0e14", "#000000", "#1a1a2e", "#16213e", "#0f1f1a", "#1a3a5a", "#2d1b3d", "#3a2a1a", "#262626"],
      light: ["#f5f6f8", "#ffffff", "#eef2f7", "#f0f4f8", "#fdf6ec", "#f5f0f0", "#eaf2ee", "#f0edf5", "#ececec", "#fafafa"],
    };

    /* 渲染预设色块；当前底色高亮 active */
    function renderBgPresets() {
      const resolved = document.documentElement.getAttribute("data-theme") || "dark";
      const cur = (getComputedStyle(document.documentElement).getPropertyValue("--bg-custom").trim() || "").toLowerCase();
      const wrap = $("bgPresets");
      wrap.innerHTML = "";
      BG_PRESETS[resolved].forEach(hex => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "bg-preset" + (hex.toLowerCase() === cur ? " active" : "");
        b.style.background = hex;
        b.title = hex;
        b.setAttribute("aria-label", "背景色 " + hex);
        b.addEventListener("click", () => { applyCustomBg(hex); closeBgPopover(); });
        wrap.appendChild(b);
      });
    }

    function openBgPopover() {
      renderBgPresets();
      const pop = $("bgColorPopover");
      pop.hidden = false;
      $("bgColorBtn").setAttribute("aria-expanded", "true");
    }

    function closeBgPopover() {
      $("bgColorPopover").hidden = true;
      $("bgColorBtn").setAttribute("aria-expanded", "false");
    }

    function toggleBgPopover() {
      if ($("bgColorPopover").hidden) openBgPopover();
      else closeBgPopover();
    }

    /* 按钮开关 popover */
    $("bgColorBtn").addEventListener("click", (e) => { e.stopPropagation(); toggleBgPopover(); });
    /* 自定义颜色选择器：input 持续预览(不关面板)，change 确认后关闭 */
    $("bgColorPicker").addEventListener("input", (e) => applyCustomBg(e.target.value));
    $("bgColorPicker").addEventListener("change", () => closeBgPopover());
    /* 重置为当前主题默认底色（深浅自动判断） */
    $("bgResetBtn").addEventListener("click", () => {
      const resolved = document.documentElement.getAttribute("data-theme") || "dark";
      localStorage.removeItem(bgKeyOf(resolved));
      applyCustomBg(BG_DEFAULTS[resolved]);
      toast("已重置为默认背景色", "info", 1800);
      closeBgPopover();
    });
    /* 点击 popover 外部 / 按 Esc 关闭 */
    document.addEventListener("click", (e) => {
      if (!$("bgColorPopover").hidden && !e.target.closest(".bg-color-wrap")) closeBgPopover();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !$("bgColorPopover").hidden) { closeBgPopover(); $("bgColorBtn").focus(); }
    });
    /* 主题切换后，预设跟随刷新 + popover 内 picker 同步当前色 */
    document.documentElement.addEventListener("data-theme-change", renderBgPresets);
    $("fetchBtn").addEventListener("click", async () => {
      if (!(await confirmBox("确定立即同步？国网有登录频率限制，请勿频繁操作。", { okText: "立即同步", danger: true }))) return;
      try { await api("/api/fetch", { method: "POST" }); toast("已启动同步，请查看运行日志", "success"); switchTab("logs"); await refreshAll(); }
      catch (e) { toast(e.message, "error"); }
    });
    $("clearLogBtn").addEventListener("click", async () => {
      if (!(await confirmBox("确定清空日志文件？此操作不可恢复。", { okText: "清空", danger: true }))) return;
      try {
        await api("/api/logs/clear", { method: "POST" });
        toast("日志已清空", "success");
        await refreshAll();
      }
      catch (e) { toast(e.message, "error"); }
    });
    $("mqttRepublishBtn").addEventListener("click", async () => {
      try {
        await api("/api/mqtt/republish", { method: "POST" });
        toast("MQTT 数据已重新发布", "success");
      }
      catch (e) { toast(e.message, "error"); }
    });

    /* 快捷键：R 刷新，S 同步，1/2/3 切换 tab */
    document.addEventListener("keydown", (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;
      if (e.ctrlKey || e.altKey || e.metaKey) return;
      const k = e.key.toLowerCase();
      if (k === "r") { e.preventDefault(); $("refreshBtn").click(); }
      else if (k === "s") { e.preventDefault(); $("fetchBtn").click(); }
      else if (k === "1") switchTab("monitor");
      else if (k === "2") switchTab("logs");
      else if (k === "3") switchTab("env");
    });

    function switchTab(name) {
      activeTab = name;
      /* tab 按钮：选中态用 aria-selected 表达，辅助技术可识别当前面板 */
      document.querySelectorAll(".tab-btn").forEach(b => {
        const isActive = b.dataset.tab === name;
        b.classList.toggle("active", isActive);
        b.setAttribute("aria-selected", isActive ? "true" : "false");
      });
      /* 面板：非活动面板对屏幕阅读器隐藏，避免读屏读到隐藏内容 */
      const panels = { monitor: $("panelMonitor"), logs: $("panelLogs"), env: $("panelEnv") };
      Object.entries(panels).forEach(([key, el]) => {
        const isActive = key === name;
        el.classList.toggle("active", isActive);
        el.setAttribute("aria-hidden", isActive ? "false" : "true");
      });
      const refreshTxt = $("refreshBtn").querySelector(".btn-text");
      if (refreshTxt) refreshTxt.textContent = name === "logs" ? "刷新日志" : "刷新数据";
      if (name === "env") loadEnv();
      scheduleLogPolling();
    }
    document.querySelectorAll(".tab-btn").forEach(b => b.addEventListener("click", () => switchTab(b.dataset.tab)));

    async function loadEnv() {
      try {
        const data = await api("/api/env");
        $("envMeta").textContent = data.exists ? `文件: ${data.path} · 更新: ${data.updated_at || "—"}` : `文件不存在: ${data.path}`;
        $("envEditor").value = data.content || "";
      } catch (e) { $("envMeta").textContent = "加载失败: " + e.message; }
    }
    $("envReloadBtn").addEventListener("click", async () => {
      try { const r = await api("/api/env/reload", { method: "POST" }); toast(r.message || "已重载", "success"); } catch (e) { toast(e.message, "error"); }
    });
    $("envSaveBtn").addEventListener("click", async () => {
      if (!(await confirmBox("确定保存 .env 并热重载配置？", { okText: "保存并应用" }))) return;
      try { const r = await api("/api/env", { method: "PUT", body: JSON.stringify({ content: $("envEditor").value }) }); toast(r.message || "已保存", "success"); await loadEnv(); await loadStatus(); }
      catch (e) { toast(e.message, "error"); }
    });

    async function bootstrap() {
      initTheme();
      const cfg = await fetch("./api/config").then(r => r.json());
      loginRequired = !!cfg.login_required;
      dbEnabled = cfg.db_enabled !== false;
      if (loginRequired && !sessionToken) { showLogin(true); return; }
      showLogin(false);
      await refreshAll();
      if (statusTimer) clearInterval(statusTimer);
      statusTimer = setInterval(loadStatus, 8000);
    }

    bootstrap().catch(() => showLogin(loginRequired));
  </script>
</body>

</html>
